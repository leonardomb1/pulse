name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./cmd/pulse/

      - name: Vet
        run: go vet ./...

  test-unit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Unit and integration tests
        run: go test ./tests/ -run "^Test[^D]" -count=1 -timeout 60s -v

      - name: Coverage
        run: |
          go test ./tests/ -run "^Test[^D]" -coverpkg=pulse/node,pulse/config,pulse/cli -coverprofile=coverage.out -timeout 60s
          go tool cover -func=coverage.out | grep total

      - name: Upload coverage
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage.out

  test-docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Docker networking tests
        env:
          PULSE_DOCKER_TEST: "1"
        run: go test ./tests/ -run "^TestDocker" -timeout 180s -v
