name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    if: >-
      !startsWith(github.event.head_commit.message, 'chore:') &&
      !startsWith(github.event.head_commit.message, 'Chore:') &&
      !startsWith(github.event.head_commit.message, 'CHORE:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./cmd/pulse/

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          gofmt -s -l . | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out || (echo "files not formatted" && exit 1)

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --enable unused,unparam,ineffassign,govet ./...

  test-unit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Unit and integration tests
        run: go test ./tests/ -run "^Test[^D]" -count=1 -timeout 600s -v

  test-docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build test image
        run: docker build -f Dockerfile.test -t pulse-test:latest .

      - name: Docker networking tests
        env:
          PULSE_DOCKER_TEST: "1"
        run: go test ./tests/ -run "^TestDocker" -timeout 600s -v
