name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test ./tests/ -run "^Test[^D]" -count=1 -timeout 60s

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/pulse-linux-amd64 ./cmd/pulse/
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/pulse-linux-arm64 ./cmd/pulse/

          cd dist && sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pulse-linux-amd64
            dist/pulse-linux-arm64
            dist/checksums.txt
